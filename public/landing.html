<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro &amp; Action Tracker</title>
  <meta name="description" content="Retronu başlat, fikirleri topla, aksiyonları unutma." />

  <!-- Google Fonts: Press Start 2P + VT323 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    rel="stylesheet"
  />

  <style>
    /* =====================================================================
       Retro & Action Tracker — Synthwave Landing
       Tek dosyalı (HTML + CSS + minimal JS)
       Mevcut projenin soft renk değişkenleri (--soft-blue, --soft-lila, vb.)
       :root içinde uyumluluk amacıyla tanımlı, ana atmosfer synthwave.
       ===================================================================== */

    :root {
      /* Synthwave / neon palette */
      --neon-pink: #ff36c8;
      --neon-magenta: #ff2bd6;
      --neon-cyan: #00f0ff;
      --neon-purple: #9b3aff;
      --neon-yellow: #ffe156;
      --deep-navy: #0b0224;
      --deep-purple: #1a0535;
      --deep-violet: #2a0a55;
      --grid-line: rgba(255, 54, 200, 0.55);
      --grid-line-soft: rgba(0, 240, 255, 0.35);

      /* Mevcut projenin soft renkleri (uyumluluk) */
      --soft-blue: #b8d4f0;
      --soft-lila: #c9b8e8;
      --soft-mint: #b8e8d4;
      --soft-peach: #f0d4b8;
      --soft-pink: #f0b8d4;
      --bg-main: #f4f6fb;
      --text-main: #3a3a5c;
      --text-muted: #7a7a9a;

      --font-display: "Press Start 2P", system-ui, sans-serif;
      --font-body: "VT323", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-body);
      color: #fff;
      background: var(--deep-navy);
      min-height: 100vh;
      position: relative;
      letter-spacing: 0.5px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ===== Synthwave background (full-screen, CSS-only) =================== */

    /* 1) Sky gradient + sun glow */
    .bg-sky {
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(
          ellipse 70% 55% at 50% 38%,
          #ff5fa2 0%,
          #b53cc7 22%,
          #5a1a8a 45%,
          var(--deep-purple) 68%,
          var(--deep-navy) 100%
        );
    }

    /* 2) Sun (neon disc with horizontal slits) */
    .bg-sun {
      position: fixed;
      left: 50%;
      top: 24%;
      width: 360px;
      height: 360px;
      z-index: -2;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: linear-gradient(
        180deg,
        #ffe156 0%,
        #ff7eb6 45%,
        #ff36c8 75%,
        #9b3aff 100%
      );
      box-shadow:
        0 0 80px 20px rgba(255, 54, 200, 0.55),
        0 0 200px 40px rgba(155, 58, 255, 0.35);
      -webkit-mask-image: repeating-linear-gradient(
        180deg,
        #000 0 18px,
        transparent 18px 22px,
        #000 22px 36px,
        transparent 36px 38px,
        #000 38px 60px,
        transparent 60px 62px,
        #000 62px
      );
              mask-image: repeating-linear-gradient(
        180deg,
        #000 0 18px,
        transparent 18px 22px,
        #000 22px 36px,
        transparent 36px 38px,
        #000 38px 60px,
        transparent 60px 62px,
        #000 62px
      );
      animation: sunPulse 6s ease-in-out infinite;
    }

    @keyframes sunPulse {
      0%, 100% {
        filter: drop-shadow(0 0 24px rgba(255, 54, 200, 0.6));
      }
      50% {
        filter: drop-shadow(0 0 48px rgba(255, 54, 200, 0.9));
      }
    }

    /* 3) Stars (CSS-only sprinkles) */
    .bg-stars {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 12% 14%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 78% 8%, #fff, transparent),
        radial-gradient(1px 1px at 25% 22%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 60% 18%, #fff, transparent),
        radial-gradient(1px 1px at 88% 28%, #fff, transparent),
        radial-gradient(2px 2px at 5% 32%, #fff, transparent),
        radial-gradient(1px 1px at 42% 6%, #fff, transparent),
        radial-gradient(1.5px 1.5px at 92% 16%, #fff, transparent);
      opacity: 0.85;
      animation: starsTwinkle 4s ease-in-out infinite alternate;
    }

    @keyframes starsTwinkle {
      from { opacity: 0.55; }
      to   { opacity: 0.95; }
    }

    /* 4) Perspective neon grid floor */
    .bg-grid {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 55vh;
      z-index: -2;
      perspective: 600px;
      perspective-origin: 50% 0%;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-grid::before {
      content: "";
      position: absolute;
      inset: -10% -10% -50% -10%;
      background-image:
        linear-gradient(var(--grid-line) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid-line) 2px, transparent 2px);
      background-size: 60px 60px;
      transform: rotateX(62deg) translateZ(0);
      transform-origin: 50% 0%;
      animation: gridScroll 6s linear infinite;
      box-shadow: 0 0 40px rgba(255, 54, 200, 0.3);
    }

    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 0 60px; }
    }

    /* 5) Dark overlay so text remains readable */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(
        ellipse at center,
        rgba(11, 2, 36, 0.25) 0%,
        rgba(11, 2, 36, 0.55) 60%,
        rgba(11, 2, 36, 0.78) 100%
      );
      pointer-events: none;
    }

    /* CRT scanlines */
    .bg-scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.04) 0 1px,
        transparent 1px 3px
      );
      mix-blend-mode: overlay;
      opacity: 0.4;
    }

    /* ===== Layout ========================================================= */

    .site {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 32px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border: 2px solid var(--neon-cyan);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--neon-cyan);
      font-family: var(--font-display);
      font-size: 12px;
      box-shadow:
        0 0 12px rgba(0, 240, 255, 0.65),
        inset 0 0 8px rgba(0, 240, 255, 0.35);
      text-shadow: 0 0 6px var(--neon-cyan);
    }

    .brand-name {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 0 8px rgba(255, 54, 200, 0.7);
    }

    .top-meta {
      font-family: var(--font-display);
      font-size: 9px;
      color: var(--neon-cyan);
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .top-meta .blink {
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px 24px;
    }

    .hero-card {
      max-width: 880px;
      width: 100%;
      text-align: center;
      padding: 48px 40px;
      border-radius: 18px;
      background: rgba(11, 2, 36, 0.55);
      border: 1.5px solid rgba(255, 54, 200, 0.45);
      box-shadow:
        0 0 0 1px rgba(0, 240, 255, 0.18) inset,
        0 0 40px rgba(255, 54, 200, 0.22),
        0 0 90px rgba(155, 58, 255, 0.25);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: cardIn 0.7s ease-out both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hero-eyebrow {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
      margin-bottom: 18px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(20px, 4vw, 38px);
      line-height: 1.4;
      color: #fff;
      letter-spacing: 1px;
      text-shadow:
        0 0 8px rgba(255, 54, 200, 0.85),
        0 0 22px rgba(255, 54, 200, 0.55),
        0 0 40px rgba(0, 240, 255, 0.35);
      margin-bottom: 8px;
    }

    .hero-title .accent {
      color: var(--neon-cyan);
      text-shadow:
        0 0 8px rgba(0, 240, 255, 0.85),
        0 0 18px rgba(0, 240, 255, 0.5);
    }

    .hero-title .amp {
      color: var(--neon-yellow);
      margin: 0 6px;
      text-shadow:
        0 0 10px rgba(255, 225, 86, 0.75),
        0 0 22px rgba(255, 225, 86, 0.4);
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-size: clamp(20px, 2.4vw, 28px);
      line-height: 1.4;
      color: #f8e9ff;
      max-width: 620px;
      margin: 18px auto 32px auto;
      text-shadow: 0 0 10px rgba(255, 54, 200, 0.3);
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 26px;
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid transparent;
      background: transparent;
      border-radius: 8px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      text-transform: uppercase;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn-pink {
      border-color: var(--neon-pink);
      color: #fff;
      box-shadow:
        0 0 12px rgba(255, 54, 200, 0.65),
        inset 0 0 12px rgba(255, 54, 200, 0.25);
      text-shadow: 0 0 8px rgba(255, 54, 200, 0.85);
    }
    .btn-pink:hover {
      background: rgba(255, 54, 200, 0.12);
      box-shadow:
        0 0 22px rgba(255, 54, 200, 0.85),
        0 0 60px rgba(255, 54, 200, 0.4),
        inset 0 0 14px rgba(255, 54, 200, 0.45);
    }

    .btn-cyan {
      border-color: var(--neon-cyan);
      color: #fff;
      box-shadow:
        0 0 12px rgba(0, 240, 255, 0.55),
        inset 0 0 12px rgba(0, 240, 255, 0.2);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.85);
    }
    .btn-cyan:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow:
        0 0 22px rgba(0, 240, 255, 0.8),
        0 0 60px rgba(0, 240, 255, 0.35),
        inset 0 0 14px rgba(0, 240, 255, 0.4);
    }

    .btn-arrow {
      display: inline-block;
      transform: translateX(0);
      transition: transform 0.2s ease;
    }
    .btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    .hero-hint {
      font-family: var(--font-body);
      font-size: 18px;
      color: #c8b6e8;
      margin-top: 18px;
      letter-spacing: 1px;
      opacity: 0.85;
    }

    .hero-hint .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
      margin: 0 8px 1px 0;
      vertical-align: middle;
      animation: blink 1.4s steps(2) infinite;
    }

    /* Footer */
    .site-foot {
      text-align: center;
      padding: 18px 24px 28px 24px;
      font-family: var(--font-display);
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.55);
    }

    .site-foot .neon-pink { color: var(--neon-pink); text-shadow: 0 0 8px rgba(255,54,200,0.7); }
    .site-foot .neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,240,255,0.7); }

    /* Glitch hover on title */
    .hero-title {
      position: relative;
      display: inline-block;
    }
    .hero-title:hover {
      animation: glitch 0.45s ease-in-out;
    }
    @keyframes glitch {
      0%   { transform: translate(0, 0); }
      20%  { transform: translate(-2px, 1px); text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-pink); }
      40%  { transform: translate(2px, -1px); }
      60%  { transform: translate(-1px, 2px); text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-pink); }
      80%  { transform: translate(1px, -2px); }
      100% { transform: translate(0, 0); }
    }

    /* ===== Responsive ===================================================== */
    @media (max-width: 720px) {
      .top-bar { padding: 16px 18px; }
      .top-meta { display: none; }

      .bg-sun { width: 240px; height: 240px; top: 22%; }

      .hero { padding: 24px 14px 60px 14px; }
      .hero-card {
        padding: 32px 22px;
        border-radius: 14px;
      }
      .hero-title { font-size: 18px; line-height: 1.5; }
      .hero-subtitle { font-size: 20px; margin: 16px auto 24px auto; }

      .actions { gap: 12px; }
      .btn { padding: 14px 18px; font-size: 10px; letter-spacing: 1px; width: 100%; justify-content: center; }
    }

    @media (max-width: 420px) {
      .brand-name { font-size: 9px; }
      .hero-eyebrow { font-size: 8px; letter-spacing: 2px; }
    }

    /* Reduced motion respect */
    @media (prefers-reduced-motion: reduce) {
      .bg-sun,
      .bg-stars,
      .bg-grid::before,
      .hero-card,
      .hero-hint .dot,
      .top-meta .blink {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Synthwave background layers (CSS-only) -->
  <div class="bg-sky" aria-hidden="true"></div>
  <div class="bg-sun" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="bg-scanlines" aria-hidden="true"></div>

  <div class="site">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">R</span>
        <span class="brand-name">RETRO &amp; ACTION</span>
      </div>
      <div class="top-meta">
        <span class="blink">●</span>&nbsp; INSERT COIN TO CONTINUE
      </div>
    </header>

    <main class="hero">
      <section class="hero-card" aria-label="Hero">
        <div class="hero-eyebrow">PRESS START — V1.0</div>

        <h1 class="hero-title" id="heroTitle">
          RETRO <span class="amp">&amp;</span> <span class="accent">ACTION TRACKER</span>
        </h1>

        <p class="hero-subtitle">
          Retronu başlat, fikirleri topla, aksiyonları unutma.
        </p>

        <div class="actions">
          <a href="/" class="btn btn-pink" data-action="new-retro">
            ▶ Yeni Retro Oluştur
            <span class="btn-arrow" aria-hidden="true">→</span>
          </a>
          <a href="/sessions" class="btn btn-cyan" data-action="old-retros">
            ◆ Eski Retroları Gör
            <span class="btn-arrow" aria-hidden="true">→</span>
          </a>
        </div>

        <p class="hero-hint">
          <span class="dot" aria-hidden="true"></span>
          Sprint sonlarını anlamlı geri bildirimlere dönüştür.
        </p>
      </section>
    </main>

    <footer class="site-foot">
      <span class="neon-pink">★</span>&nbsp; LEAN RETRO ARCADE&nbsp; <span class="neon-cyan">★</span>
      &nbsp;—&nbsp; PLAYER 1 READY
    </footer>
  </div>

  <script>
    // Minimal frontend interaction:
    // - hero title üzerinde tıklayınca glitch tekrar tetiklenir
    // - butonlara basınca kısa "press" feedback'i
    (function () {
      var title = document.getElementById("heroTitle");
      if (title) {
        title.addEventListener("click", function () {
          title.style.animation = "none";
          // force reflow
          void title.offsetWidth;
          title.style.animation = "glitch 0.45s ease-in-out";
        });
      }

      document.querySelectorAll(".btn").forEach(function (btn) {
        btn.addEventListener("mousedown", function () {
          btn.style.transform = "translateY(0) scale(0.98)";
        });
        btn.addEventListener("mouseup", function () {
          btn.style.transform = "";
        });
        btn.addEventListener("mouseleave", function () {
          btn.style.transform = "";
        });
      });
    })();
  </script>
</body>
</html>
